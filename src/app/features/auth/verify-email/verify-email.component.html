
  <section class="verify-email">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6 col-xl-5">
          <div class="verification-card">
            <div class="email-icon">
              <div class="icon-circle">
                <i class="fa-regular fa-envelope"></i>
              </div>
            </div>
            <div class="card-content">
              <h2 class="title">Check your email</h2>
              <p class="subtitle">We've sent a verification code to your email address</p>
              
              <form (ngSubmit)="onSubmit()" [class.shake-animation]="isShaking" class="verification-form">
                <div class="code-input-group">
                  <label for="email" class="visually-hidden">Verification Code</label>
                  <input 
                    type="text" 
                    id="email" 
                    name="email" 
                    class="code-input" 
                    placeholder="Enter verification code"
                    maxlength="6"
                    [(ngModel)]="resetCode"
                    [class.is-invalid]="isShaking">
                  <div class="code-hint">Enter the 6-digit code</div>
                </div>
                
                <button type="submit" class="verify-btn">
                  Verify Email
                  <i class="fas fa-arrow-right ms-2"></i>
                </button>
              </form>
              
              <div class="actions">
                <a [routerLink]="['../forgot-pass']" class="back-link">
                  <i class="fas fa-chevron-left me-2"></i>
                  Back to password reset
                </a>
                <button class="resend-btn" (click)="resendCode()" [disabled]="timeLeft > 0">
                  {{ timeLeft > 0 ? 'Resend code in ' + timeLeft + 's' : 'Resend code' }}
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
