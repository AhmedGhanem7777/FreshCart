


<section class="login-section">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6 col-xl-5">
          <div class="login-card">
            <div class="user-icon">
              <div class="icon-circle">
                <i class="fas fa-user"></i>
              </div>
            </div>
            <div class="card-content">
              <h2 class="title">Welcome Back</h2>
              <p class="subtitle">Sign in to continue to your account</p>
              
              <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
                <div class="input-group">
                  <label for="email" class="input-label">Email address</label>
                  <input 
                    type="email" 
                    id="email" 
                    formControlName="email" 
                    class="form-input" 
                    [class.is-invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
                    placeholder="Enter your email">
                  <div class="input-hint" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
                    Please enter a valid email address
                  </div>
                </div>
  
                <div class="input-group">
                  <label for="password" class="input-label">Password</label>
                  <input 
                    type="password" 
                    id="password" 
                    formControlName="password" 
                    class="form-input" 
                    [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
                    placeholder="Enter your password">
                  <div class="input-hint" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
                    Password must be at least 6 characters long
                  </div>
                </div>
                
                <button type="submit" class="submit-btn" [disabled]="loginForm.invalid || isLoading">
                  <span *ngIf="!isLoading">Log in</span>
                  <span *ngIf="isLoading">
                    <i class="fas fa-spinner fa-spin me-2"></i>
                    Signing in...
                  </span>
                </button>
  
                <div class="actions">
                  <a [routerLink]="['../forgot-password']" class="forgot-link">
                    Forgot your password?
                  </a>
                  <button type="button" class="create-account-btn" [routerLink]="['../register']">
                    Create New Account
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
